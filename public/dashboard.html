<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HARSON Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/dashboard.css" />
</head>
<body>
  <div class="dashboard-shell">

    <header class="topbar">
      <div class="top-logo">
        <span>HARSON</span>
        <small>AI Platform</small>
      </div>
      <nav class="top-nav">
        <a class="active" href="#">AIGC</a>
        <a href="#">SCM</a>
        <a href="#">PLM</a>
        <a href="#">iShop</a>
        <a href="#">iRobot</a>
      </nav>
    </header>

    <div class="dashboard-body">
      <aside class="sidebar">

        <nav class="side-nav">
          <a class="active" href="/dashboard">AIGC 设计生成</a>
          <a href="#">款式推荐</a>
          <a href="#">供应商管理</a>
          <a href="#">产品开发</a>
          <a href="#">门店总览</a>
          <a href="#">机器人调度</a>
        </nav>
      </aside>

      <main class="main">
        <section class="content">
          <div class="page-title">
            <h1>AIGC 设计生成</h1>
            <p>AI驱动鞋类设计生成系统</p>
          </div>

          <section class="stats-grid">
            <article class="stat-card">
              <span>今日生成款式</span>
              <strong>****</strong>
            </article>

            <article class="stat-card">
              <span>AI采纳率</span>
              <strong>****</strong>
            </article>

            <article class="stat-card">
              <span>机器人在线</span>
              <strong>****</strong>
            </article>

            <article class="stat-card">
              <span>门店营业额</span>
              <strong>****</strong>
            </article>
          </section>

          <section class="panel-grid">
            <article class="panel orders-panel">
              <h2>供应链订单</h2>
              <table>
                <thead>
                  <tr>
                    <th>订单号</th>
                    <th>供应商</th>
                    <th>品类</th>
                    <th>数量</th>
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td>****</td>
                    <td>****</td>
                    <td>****</td>
                    <td>****</td>
                  </tr>
                  <tr>
                    <td>****</td>
                    <td>****</td>
                    <td>****</td>
                    <td>****</td>
                  </tr>
                </tbody>
              </table>
            </article>

            <article class="panel robot-panel">
              <h2>机器人状态</h2>
              <ul>
                <li><strong>****</strong><span>***</span></li>
                <li><strong>****</strong><span>***</span></li>
                <li><strong>****</strong><span>***</span></li>
                <li><strong>****</strong><span>****</span></li>
              </ul>
            </article>
          </section>
        </section>
      </main>
    </div>

  </div>
</body>
</html>
