<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HARSON 用户账户</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body data-page="auth">
  <main class="auth-page">
    <div class="auth-card">
      <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> 返回首页</a>
      <h1>HARSON 用户中心</h1>
      <p>使用 CSV 安全账户文件维护用户、密码哈希和登录信息。</p>
      <div id="authMessage" class="auth-message"></div>
      <div class="auth-grid">
        <form id="loginForm" class="auth-form">
          <h2>登录</h2>
          <label>邮箱<input type="email" name="email" required /></label>
          <label>密码<input type="password" name="password" required /></label>
          <button type="submit">登录</button>
        </form>
        <form id="registerForm" class="auth-form">
          <h2>注册</h2>
          <label>姓名<input type="text" name="name" required /></label>
          <label>邮箱<input type="email" name="email" required /></label>
          <label>密码<input type="password" name="password" minlength="8" required /></label>
          <button type="submit">创建账户</button>
        </form>
      </div>
    </div>
  </main>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
